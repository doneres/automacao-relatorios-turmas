<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="shortcut icon"
      href="https://ctrlplay.com.br/wp-content/uploads/2024/11/cropped-favicon-32x32.png"
      type="image/x-icon"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoClass | CTRL+PLAY</title>
    <!-- Aplica o tema antes do React montar para evitar piscar -->
    <script>
      (function () {
        if (localStorage.getItem("cp-theme") === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
